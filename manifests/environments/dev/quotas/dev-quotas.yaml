# manifests/environments/dev/quotas/dev-quotas.yaml
# Development quotas — generous for velocity, still prevents runaway consumption.

apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-tenant-quota
  namespace: dev-platform
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "60"
    services: "30"
    persistentvolumeclaims: "10"
