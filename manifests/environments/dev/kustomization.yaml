# manifests/environments/dev/kustomization.yaml
# Development environment overlay.
# Lower resource requests, more permissive policies for developer velocity.
# Still runs the same GitOps and basic cost/compliance instrumentation.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev-platform

resources:
  - ../base
  - namespace.yaml
  - sample-app.yaml
  - quotas/dev-quotas.yaml

commonLabels:
  environment: dev

commonAnnotations:
  environment.platform.blueprint: "dev"
  cost.platform.blueprint/budget-monthly: "2500"
