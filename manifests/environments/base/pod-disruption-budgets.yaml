# manifests/environments/base/pod-disruption-budgets.yaml
# Example base PDBs. Real workloads should have workload-specific PDBs.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: platform-critical-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: critical
